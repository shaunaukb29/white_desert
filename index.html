<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Seas App</title>
  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; font-family:sans-serif; background:#0f1117; color:#fff; }
    .gradio-wrapper { width:100%; height:100%; display:flex; justify-content:center; align-items:center; }
    gradio-app { width:100%; height:100%; border:none; }
  </style>
</head>
<body>
  <div class="gradio-wrapper">
    <gradio-app src="https://huggingface.co/spaces/CastBison/golden_seas"></gradio-app>
  </div>
  <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/5.38.0/gradio.js"></script>
  <script>
  function nukeFooter() {
    const app = document.querySelector('gradio-app');
    if (!app || !app.shadowRoot) return;
    const root = app.shadowRoot;

    // Remove any existing footer elements
    root.querySelectorAll('footer').forEach(el => el.remove());

    // Inject style as a fallback
    if (!root.querySelector('#hide-footer-style')) {
      const style = document.createElement('style');
      style.id = 'hide-footer-style';
      style.textContent = `
        footer, .footer, [class*="footer"], 
        .svelte-footer, .show-api, .built-with { 
          display: none !important; 
          visibility: hidden !important;
          height: 0 !important;
          overflow: hidden !important;
        }
      `;
      root.appendChild(style);
    }
  }

  // Keep hammering it in case Gradio re-renders
  setInterval(nukeFooter, 500);
</script>
</body>
</html>
